version: "3.8"

services:
  mongodb:
    image: mongo
    container_name: mongodb-container
    restart: always
    volumes:
      - data:/data/db
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    container_name: redis-container
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: backend-image
    container_name: backend_container
    ports:
      - "8000:8000"
    volumes:
      - node_modules:/app/node_modules
      - .:/app
    restart: always
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379

volumes:
  data:
  node_modules:
  redis_data:
